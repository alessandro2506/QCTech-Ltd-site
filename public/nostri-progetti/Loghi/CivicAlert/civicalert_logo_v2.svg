<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#112D50"/>
      <stop offset="100%" stop-color="#060E1A"/>
    </radialGradient>
    <filter id="glow-teal">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="20" y="20" width="360" height="360" rx="76" ry="76"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect x="20" y="20" width="360" height="360" rx="76" ry="76" fill="url(#bg)"/>

  <!-- Subtle dot texture -->
  <g clip-path="url(#iconClip)" opacity="0.06">
    <circle cx="70"  cy="70"  r="1.8" fill="#00D4A8"/><circle cx="115" cy="70"  r="1.8" fill="#00D4A8"/>
    <circle cx="160" cy="70"  r="1.8" fill="#00D4A8"/><circle cx="205" cy="70"  r="1.8" fill="#00D4A8"/>
    <circle cx="250" cy="70"  r="1.8" fill="#00D4A8"/><circle cx="295" cy="70"  r="1.8" fill="#00D4A8"/>
    <circle cx="340" cy="70"  r="1.8" fill="#00D4A8"/>
    <circle cx="92"  cy="92"  r="1.8" fill="#00D4A8"/><circle cx="137" cy="92"  r="1.8" fill="#00D4A8"/>
    <circle cx="182" cy="92"  r="1.8" fill="#00D4A8"/><circle cx="227" cy="92"  r="1.8" fill="#00D4A8"/>
    <circle cx="272" cy="92"  r="1.8" fill="#00D4A8"/><circle cx="317" cy="92"  r="1.8" fill="#00D4A8"/>
  </g>

  <!-- Faint halo behind shield -->
  <ellipse cx="200" cy="185" rx="100" ry="95" fill="#00D4A8" opacity="0.05"/>

  <!-- ══ SHIELD ══ -->
  <!-- Shield body fill -->
  <path d="M200 82 L274 106 L274 192 Q274 244 200 272 Q126 244 126 192 L126 106 Z"
        fill="#0D2240"/>
  <!-- Shield inner bevel hint -->
  <path d="M200 92 L266 114 L266 190 Q266 238 200 263 Q134 238 134 190 L134 114 Z"
        fill="none" stroke="#1E4D80" stroke-width="1" opacity="0.6"/>
  <!-- Shield border glow -->
  <path d="M200 82 L274 106 L274 192 Q274 244 200 272 Q126 244 126 192 L126 106 Z"
        fill="none" stroke="#00D4A8" stroke-width="2.5" opacity="0.5"
        filter="url(#glow-teal)"/>

  <!-- ══ UK CITY SKYLINE inside shield ══ -->
  <!-- Tall central tower -->
  <rect x="194" y="164" width="12" height="63" rx="1.5" fill="#00D4A8"
        filter="url(#glow-teal)"/>
  <!-- Small rooftop extension (Big Ben / tower style) -->
  <rect x="197" y="157" width="6" height="10" rx="1" fill="#00D4A8" opacity="0.9"/>
  <!-- Left mid building -->
  <rect x="176" y="177" width="12" height="50" rx="1.5" fill="#00D4A8" opacity="0.82"/>
  <!-- Left short building -->
  <rect x="160" y="188" width="10" height="39" rx="1.5" fill="#00D4A8" opacity="0.62"/>
  <!-- Right mid building -->
  <rect x="212" y="172" width="12" height="55" rx="1.5" fill="#00D4A8" opacity="0.82"/>
  <!-- Right short building -->
  <rect x="230" y="186" width="10" height="41" rx="1.5" fill="#00D4A8" opacity="0.62"/>
  <!-- Ground base line -->
  <rect x="157" y="227" width="86" height="3" rx="1.5" fill="#00D4A8" opacity="0.48"/>

  <!-- ══ BROADCAST ARCS — alert signal ══ -->
  <!-- Inner arc: bright, tight -->
  <path d="M184 159 Q200 149 216 159"
        fill="none" stroke="#FFB703" stroke-width="4.5" stroke-linecap="round"
        filter="url(#glow-amber)"/>
  <!-- Mid arc -->
  <path d="M173 149 Q200 134 227 149"
        fill="none" stroke="#FFB703" stroke-width="3.2" stroke-linecap="round"
        opacity="0.70"/>
  <!-- Outer arc: faint -->
  <path d="M162 139 Q200 120 238 139"
        fill="none" stroke="#FFB703" stroke-width="2.4" stroke-linecap="round"
        opacity="0.38"/>
  <!-- Signal origin dot -->
  <circle cx="200" cy="163" r="4.5" fill="#FFB703" opacity="0.95"
          filter="url(#glow-amber)"/>

  <!-- ══ NAME ══ -->
  <text x="152" y="312"
        font-family="'SF Pro Display','Helvetica Neue',sans-serif"
        font-size="44" font-weight="800" letter-spacing="-1.2px"
        fill="#EEF2F7">Civic</text>
  <text x="258" y="312"
        font-family="'SF Pro Display','Helvetica Neue',sans-serif"
        font-size="44" font-weight="800" letter-spacing="-1.2px"
        fill="#00D4A8">Alert</text>

  <!-- Tagline -->
  <text x="200" y="338"
        font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif"
        font-size="11" font-weight="400" letter-spacing="3.8px"
        text-anchor="middle" fill="#3A6080">REPORT · TRACK · IMPROVE</text>

  <!-- Outer icon frame -->
  <rect x="22" y="22" width="356" height="356" rx="74" ry="74"
        fill="none" stroke="#00D4A8" stroke-width="1.5" opacity="0.2"/>
</svg>
